name: Notify jimori-site on Push

on:
  push:
    branches:
      - main

jobs:
  trigger-site-build:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Cloudflare Pages Deploy Hook
        run: |
          curl -X POST "https://api.cloudflare.com/client/v4/pages/webhooks/deploy_hooks/47894387-4800-4078-ae33-9ef06e76c039"

      - name: Log deployment trigger
        run: |
          echo "Triggered Cloudflare Pages deployment for jimori-site"
